apiVersion: 1

groups:
  - orgId: 1
    name: Batch Processing Alerts
    folder: Alerts
    interval: 1m
    rules:
      - uid: batch-cpu-high
        title: "Высокая нагрузка CPU (>80%)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              datasource:
                type: prometheus
                uid: PBFA97CFB590B2093
              expr: process_cpu_usage{job="batch-processing"} * 100
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [80]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 1m
        annotations:
          summary: "CPU usage превысил 80%"
          description: "Приложение batch-processing испытывает высокую нагрузку CPU. Текущее значение: {{ $values.A }}%"
        labels:
          severity: warning
        isPaused: false

      - uid: batch-heap-high
        title: "Высокое потребление JVM Heap (>85%)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              datasource:
                type: prometheus
                uid: PBFA97CFB590B2093
              expr: jvm_memory_used_bytes{area="heap", job="batch-processing"} / jvm_memory_max_bytes{area="heap", job="batch-processing"} * 100
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [85]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 1m
        annotations:
          summary: "JVM Heap usage превысил 85%"
          description: "Возможна утечка памяти или недостаточный размер heap в batch-processing. Текущее значение: {{ $values.A }}%"
        labels:
          severity: critical
        isPaused: false
