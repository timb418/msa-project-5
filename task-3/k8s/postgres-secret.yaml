# Значения закодированы в base64:
#   logistics     -> bG9naXN0aWNz
#   logistics123  -> bG9naXN0aWNzMTIz
#   logistics_db  -> bG9naXN0aWNzX2Ri
#
# Для генерации своих: echo -n "значение" | base64
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: logistics
type: Opaque
data:
  POSTGRES_USER: bG9naXN0aWNz
  POSTGRES_PASSWORD: bG9naXN0aWNzMTIz
  POSTGRES_DB: bG9naXN0aWNzX2Ri
